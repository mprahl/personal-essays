<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200, initial-scale=1">
    <title>Matthew's Musings social card</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }

      body {
        color: #223028;
        background: #e5eee3;
        font-family: Georgia, Cambria, "Times New Roman", Times, serif;
      }

      .masthead {
        display: flex;
        align-items: center;
        height: 96px;
        padding: 0 68px;
        color: #f4f7f1;
        background: linear-gradient(180deg, #6f8671 0%, #5f755f 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 22px;
        font-weight: 600;
        text-transform: uppercase;
      }

      main {
        position: relative;
        height: 534px;
        padding: 60px 68px 52px;
        border: 1px solid #d4cec2;
        border-top: 0;
      }

      h1 {
        max-width: 1000px;
        margin: 0;
        font-size: 78px;
        line-height: 1.05;
      }

      .rule {
        width: 88px;
        height: 5px;
        margin-top: 30px;
        background: #c79a7c;
      }

      .description {
        max-width: 1010px;
        margin: 28px 0 0;
        color: #5f685f;
        font-size: 27px;
        line-height: 1.35;
      }

      .domain {
        position: absolute;
        right: 68px;
        bottom: 48px;
        color: #5f685f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 21px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header class="masthead">Writings by Matthew Prahl</header>
    <main>
      <h1>Matthew's Musings</h1>
      <div class="rule"></div>
      <p class="description">A collection of essays, personal reflections, notes, and books about what it means to be human in the age of AI, musings on faith and early Christianity, general contemplations, and whatever else I'm interested in at the moment.</p>
      <div class="domain">essays.mprahl.com</div>
    </main>
  </body>
</html>
